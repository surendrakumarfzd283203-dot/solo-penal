<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Penal - Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-login-page">
    <div class="login-container">
        <header>
            <h1><i class="fas fa-user-shield"></i> ADMIN SECURE</h1>
            <p>Authorized Access Only</p>
        </header>
        <div class="card login-card">
            <div class="input-group">
                <i class="fas fa-user-lock"></i>
                <input type="text" id="admin-username" placeholder="Admin Username">
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="admin-password" placeholder="Admin Password">
            </div>
            <button type="button" onclick="login()" class="btn-primary">VERIFY ADMIN</button>
            <p id="error" class="error-text"></p>
        </div>
        <footer>
            <button onclick="window.location.href='index.html'" class="btn-secondary">BACK TO USER PANEL</button>
        </footer>
    </div>
    <script>
        function login() {
            var u = document.getElementById('admin-username').value;
            var p = document.getElementById('admin-password').value;
            var e = document.getElementById('error');
            e.textContent = "Checking...";
            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    e.textContent = data.error || "Login Failed";
                }
            })
            .catch(function(err) {
                e.textContent = "Error: " + err.message;
            });
        }
    </script>
</body>
</html>
